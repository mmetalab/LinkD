services:
  - type: web
    name: linkd-agent
    runtime: python
    region: oregon
    plan: starter
    pythonVersion: "3.12.7"
    buildCommand: |
      pip install -r requirements.txt
      cd interactive_web_server/frontend && npm install && npm run build
      cd ../.. && python scripts/download_data.py
    startCommand: cd interactive_web_server/backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_DIR
        value: /opt/render/project/src/data
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: NODE_VERSION
        value: "20"
      - key: GEMINI_FREE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: linkd-data
      mountPath: /opt/render/project/src/data
      sizeGB: 20
